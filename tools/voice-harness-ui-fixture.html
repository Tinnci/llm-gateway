            return Promise.resolve(fixture);
          }
          if (method === "POST" && path === "llm_gateway/harness/evaluate") {
            return Promise.resolve(evaluateScenarioDraft(payload));
          }
          return Promise.reject(new Error(`unexpected API call: ${method} ${path}`));
        },
