name: Validate

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: validate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  version-source-guard:
    runs-on: ubuntu-latest
    if: github.ref_type != 'tag'
    steps:
      - name: 📥 Checkout the repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: 🚦 Reject manual version changes
        env:
          ACTOR: ${{ github.actor }}
          EVENT_NAME: ${{ github.event_name }}
          HEAD_MESSAGE: ${{ github.event.head_commit.message }}
          BEFORE_SHA: ${{ github.event.before }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${EVENT_NAME}" == "pull_request" ]]; then
            range="${BASE_SHA}...${HEAD_SHA}"
          elif [[ "${BEFORE_SHA}" =~ ^0+$ ]]; then
            range="${HEAD_SHA}^..${HEAD_SHA}"
          else
            range="${BEFORE_SHA}..${HEAD_SHA}"
          fi

          changed="$(git diff --name-only "${range}" -- \
            pyproject.toml \
            custom_components/llm_gateway/manifest.json \
            uv.lock || true)"

          if [[ -z "${changed}" ]]; then
            exit 0
          fi

          if [[ "${ACTOR}" == "github-actions[bot]" && "${HEAD_MESSAGE}" == Release\ v* ]]; then
            exit 0
          fi

          {
            echo "Version files must not be edited manually."
            echo "Use the Release workflow_dispatch input so GitHub Actions bumps, commits, tags, and publishes the version."
            echo "Changed version files:"
            echo "${changed}"
          } >&2
          exit 1

  lint-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: 📥 Checkout the repository
        uses: actions/checkout@v4
      - name: 🛠️ Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: 🛠️ Set up Bun
        uses: oven-sh/setup-bun@v2
      - name: 🧹 Ruff check
        run: uvx ruff check custom_components tests tools/ha-earcon/src tools/ha-earcon/tests
      - name: 🎨 Ruff format check
        run: uvx ruff format --check custom_components tests tools/ha-earcon/src tools/ha-earcon/tests
      - name: 📦 Install frontend dependencies
        run: bun install --frozen-lockfile
      - name: 🔎 Frontend typecheck
        run: bun run typecheck
      - name: 🧱 Build Voice Harness panel
        run: bun run build:panel
      - name: 🧪 Pytest
        run: uv run pytest -q
      - name: 🔊 Earcon tool tests
        working-directory: tools/ha-earcon
        run: uv run pytest -q

  validate-hassfest:
    runs-on: ubuntu-latest
    # Keep hassfest visible, but do not block releases on upstream hassfest image
    # regressions. Stable/beta HA configuration validation remains required below.
    continue-on-error: true
    steps:
      - name: 📥 Checkout the repository
        uses: actions/checkout@v4
      - name: 🏃 Hassfest validation
        uses: home-assistant/actions/hassfest@master

  validate-hacs:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout the repository
        uses: actions/checkout@v4
      - name: 🏃 HACS validation
        uses: hacs/action@main
        with:
          category: integration
          # The domain is not yet in the home-assistant/brands repository.
          ignore: brands

  validate-homeassistant:
    strategy:
      fail-fast: false
      matrix:
        channel: [stable, beta]
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout the repository
        uses: actions/checkout@v4

      - name: 🛠️ Home Assistant configuration
        run: |
          mkdir ./test_configuration
          cp -r ./custom_components ./test_configuration
          echo "default_config:" >> ./test_configuration/configuration.yaml

      - name: 🏡 Home Assistant validation
        uses: ludeeus/setup-homeassistant@main
        with:
          tag: ${{ matrix.channel }}
          config-dir: test_configuration
