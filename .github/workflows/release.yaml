name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release-zip:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate tag and manifest version
        shell: bash
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME#v}"
          version="$(python3 -c 'import json; print(json.load(open("custom_components/llm_gateway/manifest.json", encoding="utf-8"))["version"])')"
          if [[ "$tag" != "$version" ]]; then
            echo "Tag v$tag does not match manifest version $version" >&2
            exit 1
          fi

      - name: Build HACS component zip
        run: |
          cd custom_components/llm_gateway
          zip -r "${GITHUB_WORKSPACE}/llm_gateway.zip" . \
            -x "**/__pycache__/" \
            -x "**/__pycache__/*" \
            -x "**/*.pyc" \
            -x "**/.DS_Store"

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: llm_gateway.zip
          generate_release_notes: true
          fail_on_unmatched_files: true
